# 게시된 릴리스에 JamoCombine.exe가 있어야
# https://github.com/.../releases/latest/download/JamoCombine.exe 가 동작합니다.
name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build JamoCombine.exe
        run: python -m PyInstaller --noconfirm JamoCombine.spec

      - name: Publish release with EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/JamoCombine.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
